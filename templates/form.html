{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-white tracking-tight mb-2">Форма переноса материалов</h1>
        <p class="text-gray-400 text-sm">Заполните все поля для внесения в реестр.</p>
    </div>

    <div class="glass-panel rounded-xl p-8 shadow-2xl">
        {% if file_url %}
        <div class="mb-8 p-4 bg-blue-500/10 border border-brand/30 rounded-lg flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
            <div class="space-y-1 w-full overflow-hidden">
                <p class="text-xs font-semibold text-white uppercase tracking-wider">Ссылка на снимок сгенерирована:</p>
                <p class="text-sm text-blue-400 font-mono truncate" id="photo-url">{{ file_url }}</p>
            </div>
            <button type="button" onclick="copyToClipboard()" class="btn-secondary px-4 py-2 text-xs text-white shrink-0">
                Копировать
            </button>
        </div>
        <script>
            function copyToClipboard() {
                const urlText = document.getElementById('photo-url').innerText;
                navigator.clipboard.writeText(urlText).then(() => {
                    alert('Ссылка скопирована в буфер обмена');
                });
            }
        </script>
        {% endif %}

        <form action="/submit" method="POST" enctype="multipart/form-data" class="space-y-6">
            <div class="space-y-1.5">
                <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider">1. Имя Фамилия:</label>
                <input type="text" name="suspect_name" required class="w-full input-glass rounded-lg p-3 text-sm">
            </div>
            <div class="space-y-1.5">
                <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider">2. Фракция:</label>
                <div class="relative">
                    <select name="faction" required class="w-full input-glass rounded-lg p-3 text-sm appearance-none cursor-pointer">
                        <option value="Русская мафия [RM]" class="bg-gray-900">Русская мафия [RM]</option>
                        <option value="Армянская мафия [AM]" class="bg-gray-900">Армянская мафия [AM]</option>
                        <option value="Мексиканская мафия [MM]" class="bg-gray-900">Мексиканская мафия [MM]</option>
                        <option value="Итальянская мафия [LCN]" class="bg-gray-900">Итальянская мафия [LCN]</option>
                        <option value="Японская Мафия [YAK]" class="bg-gray-900">Японская Мафия [YAK]</option>
                        <option value="The Families [FAM]" class="bg-gray-900">The Families [FAM]</option>
                        <option value="East Side Ballas [ESB]" class="bg-gray-900">East Side Ballas [ESB]</option>
                        <option value="Marabunta Grande [MG13]" class="bg-gray-900">Marabunta Grande [MG13]</option>
                        <option value="Los Santos Vagos [LSV]" class="bg-gray-900">Los Santos Vagos [LSV]</option>
                        <option value="Bloods Street Gang [BSG]" class="bg-gray-900">Bloods Street Gang [BSG]</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
            </div>
            <div class="space-y-1.5">
                <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider">3. Ссылка на Материал:</label>
                <input type="url" name="material_link" required class="w-full input-glass rounded-lg p-3 text-sm">
            </div>
            <div class="space-y-1.5">
                <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider">4. Описание материала:</label>
                <textarea name="description" required placeholder="Описание: Дата и время произошедшего, тип улики | Пример: Поставка NG 07.05 21:07" class="w-full input-glass rounded-lg p-3 text-sm h-28 resize-none"></textarea>
            </div>
            <div class="space-y-1.5">
                <label class="block text-xs font-semibold text-gray-300 uppercase tracking-wider">5. Отчет о переносе на компьютер:</label>
                <input type="file" name="photo" accept="image/*" required class="w-full input-glass rounded-lg p-2.5 text-sm file:mr-4 file:py-2 file:px-4 file:border-0 file:rounded-md file:bg-white/10 file:text-white file:font-medium hover:file:bg-white/20 cursor-pointer transition-all">
            </div>
            <div class="pt-4">
                <button type="submit" class="w-full bg-brand hover:bg-brandHover text-white font-medium py-3.5 rounded-lg shadow-[0_0_20px_rgba(59,130,246,0.3)] transition-all transform hover:-translate-y-0.5">Отправить</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
