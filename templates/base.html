<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChetSpy | Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { 
                        brand: '#3b82f6', 
                        brandHover: '#2563eb',
                        surface: 'rgba(255, 255, 255, 0.03)',
                        borderGlass: 'rgba(255, 255, 255, 0.08)'
                    } 
                } 
            } 
        }
    </script>
    <style>
        body { 
            background: radial-gradient(circle at top, #111827 0%, #030712 100%);
            color: #f3f4f6; 
            min-height: 100vh;
        }
        .glass-panel { 
            background: rgba(17, 24, 39, 0.6); 
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .input-glass { 
            background: rgba(0, 0, 0, 0.2); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: #fff; 
            transition: all 0.3s ease; 
        }
        .input-glass:focus { 
            border-color: #3b82f6; 
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); 
            outline: none; 
            background: rgba(0, 0, 0, 0.4);
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        .btn-secondary { background: transparent; border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s; border-radius: 6px; }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body class="flex flex-col antialiased selection:bg-brand selection:text-white">
    <header class="sticky top-0 z-50 glass-panel border-b-0 border-borderGlass">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="flex items-center gap-8">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded bg-brand flex items-center justify-center shadow-[0_0_15px_rgba(59,130,246,0.5)]">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    </div>
                    <span class="text-white font-bold text-lg tracking-wide">ChetSpy</span>
                </div>
                <nav class="hidden md:flex gap-6 text-sm font-medium text-gray-400">
                    <a href="/" class="hover:text-white transition-colors duration-200">Сводка</a>
                    <a href="/form" class="hover:text-white transition-colors duration-200">Перенос улик</a>
                    {% if user and user.role in ['check', 'full'] %}
                        <a href="/table" class="hover:text-white transition-colors duration-200">Реестр БД</a>
                    {% endif %}
                    {% if user and user.role == 'full' %}
                        <a href="/admin" class="hover:text-white transition-colors duration-200">Управление</a>
                    {% endif %}
                </nav>
            </div>
            <div class="flex items-center gap-4 text-sm font-medium">
                {% if user %}
                    <div class="flex items-center gap-3 bg-white/5 rounded-full py-1.5 px-4 border border-white/10">
                        <span class="text-gray-300">{{ user.username }}</span>
                        <span class="w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.8)]"></span>
                    </div>
                    <a href="/logout" class="text-red-400 hover:text-red-300 transition px-2">Выйти</a>
                {% else %}
                    <a href="/login" class="bg-brand hover:bg-brandHover text-white px-5 py-2 rounded-md transition-all shadow-[0_0_20px_rgba(59,130,246,0.3)]">
                        Авторизация
                    </a>
                {% endif %}
            </div>
        </div>
    </header>
    <main class="flex-grow p-6 md:p-12 w-full">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
